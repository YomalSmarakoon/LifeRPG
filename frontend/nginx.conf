server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Service worker — no caching so updates are picked up immediately
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Web app manifest — short cache
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=3600";
    }

    # Hashed static assets (JS/CSS/fonts) — long cache, immutable
    location ~* \.(js|css|woff2|woff|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Images and icons — moderate cache
    location ~* \.(png|svg|ico|webp|jpg|jpeg|gif)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
